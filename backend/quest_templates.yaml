        label: "How many hours per week {name} works"
        value: "15 Stunden"
        reveal_hint: "Only answer if the user directly asks how many hours you work."
    end_goal:
      description: "Find out about her job and agree to visit her at the coffee shop."
      success_criteria: "The user agrees to visit {name} at Kaffee Schwarz."
    debrief:
      - type: fill_blank
        question: "{name} arbeitet als ___"
        answer: "Barista"
      - type: fill_blank
        question: "{name} arbeitet bei ___"
        answer: "Kaffee Schwarz"
      - type: true_false
        question: "{name} arbeitet 15 Stunden pro Woche."
        answer: true

