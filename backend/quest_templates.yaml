# Quest templates for Parlova conversation quests
#
# RULE: Penelope's fixed biographical facts (Neukölln, UdK, Kaffee Schwarz, Lyon, etc.)
# are HARDCODED — never slotted — so debrief answers always match what she says.
# Slots are used ONLY for dynamic per-session facts that the agent is instructed to reveal.
#
# label: shown in the case-file briefing card (English, supports {name})
# reveal_hint: tells the LLM when to answer — always "Only answer if the user directly asks…"

