# ──────────────────────────────────────────
# A1 quest templates (10 templates × 3 questions = 30 debrief items)
# ──────────────────────────────────────────
A1:
  - id: a1_cafe_plan
    topic: Planning a café meetup
    persona_facts:
      - key: wohnt_in
        label: "Which neighborhood {name} lives in"
        value: "Neukölln"
        reveal_hint: "Only answer if the user directly asks where you live."
      - key: treffpunkt
        label: "Where {name} wants to meet"
        value: "{treffpunkt}"
        reveal_hint: "Only answer if the user directly asks where to meet or suggests a place."
      - key: tag_frei
        label: "Which day {name} is free"
        value: "{tag}"
        reveal_hint: "Only answer if the user directly asks when you are free or want to meet."
    end_goal:
      description: "Agree on a specific day, time, and place to meet."
      success_criteria: "The user confirms a specific day and location to meet."
    debrief:
      - type: fill_blank
        question: "{name} wohnt in ___"
        answer: "Neukölln"
      - type: fill_blank
        question: "{name} möchte sich treffen bei ___"
        answer: "{treffpunkt}"
      - type: fill_blank
        question: "{name} hat Zeit am ___"
        answer: "{tag}"

  - id: a1_fotografie
    topic: Photography and hobbies
    persona_facts:
      - key: kamera
        label: "What camera {name} uses"
        value: "Nikon F3"
        reveal_hint: "Only answer if the user directly asks what camera or equipment you use."
      - key: lieblingsort_foto
        label: "Where {name} likes to take photos"
        value: "Mauerpark"
        reveal_hint: "Only answer if the user directly asks where you take photos or like to go."
      - key: film_typ
        label: "What kind of film {name} shoots"
        value: "Schwarz-Weiß"
        reveal_hint: "Only answer if the user directly asks what kind of photos you make."
    end_goal:
      description: "Find out about her photography and suggest going somewhere to take photos together."
      success_criteria: "The user suggests going to a specific place to take photos with {name}."
    debrief:
      - type: fill_blank
        question: "{name} fotografiert mit einer ___"
        answer: "Nikon F3"
      - type: fill_blank
        question: "{name} fotografiert gern im ___"
        answer: "Mauerpark"
      - type: true_false
        question: "{name} fotografiert in Schwarz-Weiß."
        answer: true

  - id: a1_getting_around
    topic: Getting around Berlin
    persona_facts:
      - key: transport
        label: "How {name} gets to university"
        value: "U-Bahn"
        reveal_hint: "Only answer if the user directly asks how you get to uni or get around."
      - key: wohnt_in
        label: "Which neighborhood {name} lives in"
        value: "Neukölln"
        reveal_hint: "Only answer if the user directly asks where you live."
      - key: arbeitet_in
        label: "Which neighborhood {name} works in"
        value: "Kreuzberg"
        reveal_hint: "Only answer if the user directly asks where you work."
    end_goal:
      description: "Get directions or travel advice from {name} for getting somewhere in Berlin."
      success_criteria: "The user asks for and receives specific transport advice."
    debrief:
      - type: fill_blank
        question: "{name} fährt mit der ___ zur Uni."
        answer: "U-Bahn"
      - type: fill_blank
        question: "{name} wohnt in ___"
        answer: "Neukölln"
      - type: fill_blank
        question: "{name} arbeitet in ___"
        answer: "Kreuzberg"

  - id: a1_wochenende
    topic: Weekend plans
    persona_facts:
      - key: wochenendplan
        label: "What {name} wants to do this weekend"
        value: "{wochenendplan}"
        reveal_hint: "Only answer if the user directly asks what you are doing this weekend."
      - key: lieblingsort
        label: "{name}'s favourite spot in Berlin"
        value: "Mauerpark"
        reveal_hint: "Only answer if the user directly asks about your favourite spot."
      - key: wohnt_in
        label: "Which neighborhood {name} lives in"
        value: "Neukölln"
        reveal_hint: "Only answer if the user directly asks where you live."
    end_goal:
      description: "Make a plan together for the weekend."
      success_criteria: "The user agrees to or suggests a specific weekend activity with {name}."
    debrief:
      - type: fill_blank
        question: "{name} möchte am Wochenende ___"
        answer: "{wochenendplan}"
      - type: fill_blank
        question: "{name}s Lieblingsort ist der ___"
        answer: "Mauerpark"
      - type: fill_blank
        question: "{name} wohnt in ___"
        answer: "Neukölln"

  - id: a1_job
    topic: Her job at the coffee shop
    persona_facts:
      - key: job
        label: "What {name}'s job is"
        value: "Barista"
        reveal_hint: "Only answer if the user directly asks what you do for work."
      - key: cafe_job
        label: "Where {name} works"
        value: "Kaffee Schwarz"
        reveal_hint: "Only answer if the user directly asks where you work."
